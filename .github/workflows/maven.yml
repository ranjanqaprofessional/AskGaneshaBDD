name: Maven CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Maven
      run: mvn -B clean test verify || true
      # `|| true` ensures the workflow continues even if tests or reporting fail

    - name: Upload Cucumber JSON
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cucumber-json
        path: target/cucumber.json
        if-no-files-found: ignore

    - name: Upload Extent Report PDF
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: extent-report
        path: "target/Extent Reports/Extent Report.pdf"
        if-no-files-found: ignore