name: Maven CI with Reports

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Chrome and ChromeDriver
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver
        which chromium-browser
        which chromedriver

    - name: Build with Maven
      run: mvn -B clean test verify || true
      # `|| true` ensures workflow continues even if tests fail

    - name: Upload Cucumber JSON
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cucumber-json
        path: target/cucumber.json
        if-no-files-found: ignore

    - name: Upload Extent Report PDF
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: extent-report
        path: "target/ExtentReports/ExtentReport.pdf"
        if-no-files-found: ignore

    - name: Upload Extent Spark HTML
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: extent-spark
        path: "target/ExtentReports/ExtentSpark.html"
        if-no-files-found: ignore

    - name: Upload Spark HTML for GitHub Pages
      if: always()
      uses: actions/upload-pages-artifact@v3
      with:
        path: target/ExtentReports

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4